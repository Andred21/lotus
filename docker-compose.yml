services:
  app:
    build: { context: ., dockerfile: docker/php/Dockerfile, args: { UID: 1000, GID: 1000 } }
    volumes:
      - ./backend:/var/www:cached
      - ./frontend:/frontend:cached
    depends_on: [mysql, gotenberg]
    
  nginx:
    image: nginx:alpine
    ports: ["8080:80"]
    volumes:
      - ./backend:/var/www:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: lotus
      MYSQL_ROOT_PASSWORD: secret
    ports: ["3307:3306"]
    volumes:
      - lotus-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-psecret"]
      interval: 10s
      retries: 5

  gotenberg:
    image: gotenberg/gotenberg:8



volumes:
  lotus-db:
