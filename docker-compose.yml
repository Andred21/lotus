services:
  app:
    build: { context: ., dockerfile: docker/php/Dockerfile, args: { UID: 1000, GID: 1000 } }
    volumes:
      - ./backend:/var/www:cached
      - ./frontend:/frontend:cached
    depends_on: [mysql, gotenberg, minio]

  nginx:
    image: nginx:alpine
    ports: ["8080:80"]
    volumes:
      - ./backend:/var/www:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: lotus
      MYSQL_ROOT_PASSWORD: secret
    ports: ["3307:3306"]
    volumes:
      - lotus-db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-psecret"]
      interval: 10s
      retries: 5

  gotenberg:
    image: gotenberg/gotenberg:8

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: lotus
      MINIO_ROOT_PASSWORD: lotus-secret
    ports: ["9000:9000", "9001:9001"]
    volumes:
      - lotus-minio:/data

  createbuckets:
    image: minio/mc
    depends_on: [minio]
    entrypoint: >
      /bin/sh -c "
      until (/usr/bin/mc alias set local http://minio:9000 lotus lotus-secret) do echo waiting for minio; sleep 2; done;
      /usr/bin/mc mb -p local/lotus;
      exit 0;
      "

volumes:
  lotus-db:
  lotus-minio:
